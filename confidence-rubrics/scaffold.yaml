artifact: scaffold-bundle
max-score: 10
dimensions:
  - id: pack-completeness
    weight: 2
    question: "Does the scaffold include all artifacts required by the chosen stack-pack manifest (selected host adapter, husky/, configs/, structure/)?"
    evidence-required: "File list comparison: pack manifest sections vs actually-written files"
  - id: agent-roster
    weight: 2
    question: "Are all attached agents present in the selected host agents folder with correct frontmatter?"
    evidence-required: "Selected host agents folder listing + frontmatter validation result"
  - id: rules-applied
    weight: 2
    question: "Are all attached rules present in the selected host rules folder AND referenced from the selected host instruction or rules surface?"
    evidence-required: "Selected host rules folder listing + grep for each mandatory rule name in the selected host instruction/rules surface"
  - id: settings-deny-list
    weight: 2
    question: "Does the selected host settings file contain the mandatory deny-list when the host supports command permissions?"
    evidence-required: "Selected host settings/permissions evidence containing all mandatory destructive-command denies, or documented host limitation"
  - id: pre-commit-active
    weight: 2
    question: "Is the pre-commit pipeline installed and runnable (husky directory exists, hooks executable, commitlint config present)?"
    evidence-required: ".husky/_/husky.sh exists OR npm run prepare ran successfully; commitlint.config.js readable"
gates:
  block-below: 9
  warn-below: 10
