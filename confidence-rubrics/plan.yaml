artifact: implementation-plan
max-score: 10
dimensions:
  - id: mvp-production-slice
    weight: 2
    question: "Does the plan define the smallest user-valuable production slice, anti-bloat boundary, release owner, and deploy-only completion target?"
    evidence-required: "MVP production slice, user value, approved/deferred/rejected scope, anti-bloat gate, owner, and deploy-only acceptance"
  - id: task-granularity
    weight: 2
    question: "Is every task bite-sized (2-5 minutes), with concrete files-to-touch and code shown?"
    evidence-required: "Tasks contain Files section (Create/Modify) and code blocks for code steps"
  - id: verification-evidence
    weight: 2
    question: "Does every task and release gate include a verification command, expected evidence, and no generic acceptance criteria?"
    evidence-required: "Verification command per task, expected stdout/exit-code, and concrete acceptance criteria"
  - id: spec-coverage
    weight: 1
    question: "Does every requirement in the source spec map to at least one task?"
    evidence-required: "Coverage matrix or annotation linking spec sections to task numbers"
  - id: scope-safety
    weight: 1
    question: "Does every task map to approved scope, with deferred/rejected extras documented and accepted expansions carrying a tradeoff?"
    evidence-required: "Scope Safety Gate plus task-to-scope mapping and zero unapproved additions"
  - id: rollback-safety
    weight: 2
    question: "Are commits frequent enough that any single task failure can be rolled back without losing other work?"
    evidence-required: "Commit step at the end of each task or each green test"
gates:
  block-below: 9
  warn-below: 10
