id: _atomic/husky-base
name: "Atomic: Husky base setup"
version: 1.0.0
description: "Base husky pre-commit/commit-msg/pre-push hooks (stack-agnostic)"
type: atomic

agents-attach: []
rules-attach: [pre-commit-discipline]

scaffold:
  husky:
    pre-commit: "templates/husky/pre-commit-base"
    commit-msg: "templates/husky/commit-msg"
    pre-push: "templates/husky/pre-push-base"

  root-files:
    - { path: ".husky/_/husky.sh", source: "auto-generated by husky install" }
